<div class="code-editor">
  <div class="code-editor__header">
    <div class="code-editor__tabs">
      <button
        class="code-editor__tab"
        [class.active]="activeTab() === 'json'"
        (click)="setTab('json')"
        title="Editable builder model"
      >JSON</button>
      <button
        class="code-editor__tab"
        [class.active]="activeTab() === 'html'"
        (click)="setTab('html')"
        title="Generated HTML (read-only)"
      >HTML</button>
      <button
        class="code-editor__tab"
        [class.active]="activeTab() === 'css'"
        (click)="setTab('css')"
        title="Generated CSS (read-only)"
      >CSS</button>
      <button
        class="code-editor__tab"
        [class.active]="activeTab() === 'js'"
        (click)="setTab('js')"
        title="Generated JavaScript (read-only)"
      >JS</button>
    </div>
    @if (activeTab() === 'json') {
      <span class="code-editor__status" [class.error]="parseError()">
        @if (parseError()) {
          Invalid: {{ parseError() }}
        } @else {
          Synced
        }
      </span>
      <button class="code-editor__action" (click)="formatCode()" title="Format JSON">Format</button>
    } @else {
      <span class="code-editor__status">Read-only preview</span>
      <button class="code-editor__action" (click)="copyReadonly()" title="Copy to clipboard">Copy</button>
    }
  </div>

  @if (activeTab() === 'json') {
    <div class="code-editor__body">
      <pre class="code-editor__highlight hljs" aria-hidden="true" [innerHTML]="highlightedJson()"></pre>
      <textarea
        class="code-editor__textarea"
        spellcheck="false"
        [ngModel]="codeText()"
        (ngModelChange)="onCodeInput($event)"
        (scroll)="onEditorScroll($event)"
      ></textarea>
    </div>
  } @else {
    <div class="code-editor__body">
      <pre class="code-editor__highlight hljs hljs--readonly" [innerHTML]="readonlyHighlighted()"></pre>
    </div>
  }
</div>
