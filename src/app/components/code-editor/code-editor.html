<div class="code-editor">
  <div class="code-editor__header">
    <span class="code-editor__title">Code</span>
    <span class="code-editor__status" [class.error]="parseError()">
      @if (parseError()) {
        Invalid: {{ parseError() }}
      } @else {
        Synced
      }
    </span>
    <button class="code-editor__format" (click)="formatCode()" title="Format JSON">Format</button>
  </div>
  <textarea
    class="code-editor__textarea"
    spellcheck="false"
    [ngModel]="codeText()"
    (ngModelChange)="onCodeInput($event)"
  ></textarea>
</div>
