<div class="toolbar-container">
  <div class="toolbar-left">
    <img class="toolbar-logo" src="twk-logo.png" alt="TWK" />
    <span class="app-title">MAB</span>
  </div>
  <div class="toolbar-right">
    @if (builder.appThemeMode() === 'auto') {
      <button class="theme-toggle" (click)="toggleTheme()">
        {{ themeService.theme() === 'dark' ? '☀️' : '🌙' }}
      </button>
    }
    <button class="toolbar-btn new-btn" (click)="newDesign()">New</button>
    <button class="toolbar-btn debug-btn" [class.debug-btn--active]="builder.debugMode()" (click)="builder.debugMode.set(!builder.debugMode())">Debug</button>
    <button class="toolbar-btn grid-btn" [class.grid-btn--active]="builder.showGrid()" (click)="builder.showGrid.set(!builder.showGrid())">Grid</button>
    <button class="toolbar-btn import-btn" (click)="triggerImport()">Import ZIP</button>
    <input #fileInput type="file" accept=".zip" (change)="onFileSelected($event)" hidden />
    <select class="lang-select" [value]="previewLang" (change)="setPreviewLang($any($event.target).value)">
      <option value="en">EN</option>
      <option value="ar">AR</option>
    </select>
    <button class="toolbar-btn preview-btn" (click)="preview()">Preview</button>
    <button class="toolbar-btn export-btn" (click)="export()">Export ZIP</button>
  </div>
</div>
@if (showPreview) {
  <app-preview-modal [pages]="previewPages" (close)="closePreview()"></app-preview-modal>
}
