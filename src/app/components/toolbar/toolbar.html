<div class="toolbar-container">
  <div class="toolbar-left">
    <img class="toolbar-logo" src="twk-logo.png" alt="TWK" />
    <span class="app-title">MAB</span>
    <div class="history-group">
      <button
        class="history-btn"
        [disabled]="!history.canUndo()"
        (click)="history.undo()"
        title="Undo (Ctrl+Z)"
        aria-label="Undo"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 14 4 9l5-5"/>
          <path d="M4 9h11a5 5 0 0 1 0 10h-4"/>
        </svg>
      </button>
      <button
        class="history-btn"
        [disabled]="!history.canRedo()"
        (click)="history.redo()"
        title="Redo (Ctrl+Shift+Z)"
        aria-label="Redo"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 14 5-5-5-5"/>
          <path d="M20 9H9a5 5 0 0 0 0 10h4"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="toolbar-right">
    @if (builder.appThemeMode() === 'auto') {
      <button class="theme-toggle" (click)="toggleTheme()">
        {{ themeService.theme() === 'dark' ? '☀️' : '🌙' }}
      </button>
    }
    <button class="toolbar-btn new-btn" (click)="newDesign()">New</button>
    <button class="toolbar-btn save-rev-btn" (click)="saveRevision()">Save Rev</button>
    <div class="revisions-wrapper">
      <button class="toolbar-btn rev-btn" (click)="toggleRevisions()">
        {{ activeRevisionName() || 'Revisions' }}
      </button>
      @if (showRevisions) {
        <div class="revisions-dropdown">
          @if (builder.revisions().length === 0) {
            <div class="revisions-empty">No revisions saved yet</div>
          }
          @for (rev of builder.revisions(); track rev.id) {
            <div class="revision-item" [class.revision-item--active]="builder.activeRevisionId() === rev.id" (click)="loadRevision(rev.id)">
              <div class="revision-item__info">
                <span class="revision-item__name">{{ rev.name }}</span>
                <span class="revision-item__date">{{ formatDate(rev.timestamp) }}</span>
              </div>
              <button class="revision-item__delete" (click)="deleteRevision($event, rev.id)">x</button>
            </div>
          }
        </div>
      }
    </div>
    <button class="toolbar-btn debug-btn" [class.debug-btn--active]="builder.debugMode()" (click)="builder.debugMode.set(!builder.debugMode())">Debug</button>
    <button class="toolbar-btn grid-btn" [class.grid-btn--active]="builder.showGrid()" (click)="builder.showGrid.set(!builder.showGrid())">Grid</button>
    <button class="toolbar-btn import-btn" (click)="triggerImport()">Import ZIP</button>
    <input #fileInput type="file" accept=".zip" (change)="onFileSelected($event)" hidden />
    <select class="lang-select" [value]="previewLang" (change)="setPreviewLang($any($event.target).value)">
      <option value="en">EN</option>
      <option value="ar">AR</option>
    </select>
    <button class="toolbar-btn preview-btn" (click)="preview()">Preview</button>
    <button class="toolbar-btn export-btn" (click)="export()">Export ZIP</button>
  </div>
</div>
@if (showPreview) {
  <app-preview-modal [pages]="previewPages" (close)="closePreview()"></app-preview-modal>
}
