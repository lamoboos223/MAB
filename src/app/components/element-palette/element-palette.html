<div class="palette-rail">
  <div class="palette-rail__tabs">
    <button
      class="palette-rail__tab"
      [class.active]="activeTab() === 'elements'"
      (click)="activeTab.set('elements')"
    >Elements</button>
    <button
      class="palette-rail__tab"
      [class.active]="activeTab() === 'blocks'"
      (click)="activeTab.set('blocks')"
    >Blocks</button>
  </div>

  @if (activeTab() === 'elements') {
    <div class="palette-rail__items">
      @for (item of elements; track item.type) {
        <button
          class="palette-rail__item"
          [title]="item.label"
          (click)="addElement(item.type)"
        >
          <span class="palette-rail__icon">{{ item.icon }}</span>
          <span class="palette-rail__name">{{ item.label }}</span>
        </button>
      }
    </div>
  } @else {
    <button class="palette-rail__save-block" (click)="saveSelectionAsBlock()">
      + Save selection as block
    </button>
    <div class="palette-rail__items">
      @for (block of builder.blocks(); track block.id) {
        <button
          class="palette-rail__item palette-rail__item--block"
          [title]="block.name"
          (click)="addBlock(block.id)"
        >
          <span class="palette-rail__icon">{{ block.icon }}</span>
          <span class="palette-rail__name">{{ block.name }}</span>
          <span class="palette-rail__delete" (click)="deleteBlock($event, block.id)" title="Delete block">×</span>
        </button>
      }
      @empty {
        <div class="palette-rail__empty">
          No blocks yet. Select an element on the canvas, then click "Save selection as block".
        </div>
      }
    </div>
  }

  <div class="palette-rail__label palette-rail__label--divider">Mode</div>
  <div class="palette-rail__theme">
    <button
      class="palette-rail__theme-btn"
      [class.active]="builder.appThemeMode() === 'light'"
      (click)="setThemeMode('light')"
      title="Light theme"
    ><span>&#9788;</span> Light</button>
    <button
      class="palette-rail__theme-btn"
      [class.active]="builder.appThemeMode() === 'dark'"
      (click)="setThemeMode('dark')"
      title="Dark theme"
    ><span>&#9790;</span> Dark</button>
    <button
      class="palette-rail__theme-btn"
      [class.active]="builder.appThemeMode() === 'auto'"
      (click)="setThemeMode('auto')"
      title="Auto theme"
    ><span>&#9684;</span> Auto</button>
  </div>

  <div class="palette-rail__label palette-rail__label--divider">Language</div>
  <div class="palette-rail__theme palette-rail__theme--row">
    <button
      class="palette-rail__theme-btn"
      [class.active]="builder.activeLang() === 'en'"
      (click)="builder.activeLang.set('en')"
      title="English"
    >EN</button>
    <button
      class="palette-rail__theme-btn"
      [class.active]="builder.activeLang() === 'ar'"
      (click)="builder.activeLang.set('ar')"
      title="Arabic"
    >AR</button>
  </div>
</div>
