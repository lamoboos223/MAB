@if (element; as el) {
  @if (isAutoTheme) {
    <div class="theme-hint">
      Editing <strong>{{ styleThemeTab }}</strong> styles — use toolbar toggle to switch
    </div>
  }

  <div class="style-group">
    <label>Font Size</label>
    <input type="text" [ngModel]="activeStyles.fontSize" (ngModelChange)="updateStyle('fontSize', $event)" placeholder="e.g. 16px">
  </div>

  <div class="style-group">
    <label>Font Weight</label>
    <select [ngModel]="activeStyles.fontWeight" (ngModelChange)="updateStyle('fontWeight', $event)">
      <option value="">Default</option>
      <option value="100">100</option>
      <option value="200">200</option>
      <option value="300">300</option>
      <option value="400">400</option>
      <option value="500">500</option>
      <option value="600">600</option>
      <option value="700">700</option>
      <option value="800">800</option>
      <option value="900">900</option>
    </select>
  </div>

  <div class="style-group">
    <label>Color</label>
    <input type="color" [ngModel]="activeStyles.color || (styleThemeTab === 'dark' ? '#ffffff' : '#000000')" (ngModelChange)="updateStyle('color', $event)">
  </div>

  <div class="style-group">
    <label>Background Color</label>
    <input type="color" [ngModel]="activeStyles.backgroundColor || (styleThemeTab === 'dark' ? '#000000' : '#ffffff')" (ngModelChange)="updateStyle('backgroundColor', $event)">
  </div>

  <div class="style-group">
    <label>Text Align</label>
    <select [ngModel]="activeStyles.textAlign" (ngModelChange)="updateStyle('textAlign', $event)">
      <option value="">Default</option>
      <option value="left">Left</option>
      <option value="center">Center</option>
      <option value="right">Right</option>
    </select>
  </div>

  <div class="style-group">
    <label>Padding</label>
    <input type="text" [ngModel]="activeStyles.padding" (ngModelChange)="updateStyle('padding', $event)" placeholder="e.g. 8px">
  </div>

  <div class="style-group">
    <label>Margin</label>
    <input type="text" [ngModel]="activeStyles.margin" (ngModelChange)="updateStyle('margin', $event)" placeholder="e.g. 8px">
  </div>

  <div class="style-group">
    <label>Border Radius</label>
    <input type="text" [ngModel]="activeStyles.borderRadius" (ngModelChange)="updateStyle('borderRadius', $event)" placeholder="e.g. 4px">
  </div>

  <div class="style-group">
    <label>Border</label>
    <input type="text" [ngModel]="activeStyles.border" (ngModelChange)="updateStyle('border', $event)" placeholder="e.g. 1px solid #333">
  </div>

  <div class="style-group">
    <label>Width</label>
    <input type="text" [ngModel]="activeStyles.width" (ngModelChange)="updateStyle('width', $event)" placeholder="e.g. 100%">
  </div>

  <div class="style-group">
    <label>Height</label>
    <input type="text" [ngModel]="activeStyles.height" (ngModelChange)="updateStyle('height', $event)" placeholder="e.g. auto">
  </div>
}
