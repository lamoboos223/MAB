<div class="builder-layout">
  <app-toolbar class="toolbar"></app-toolbar>
  <div class="main-content">
    <app-element-palette class="palette" [style.width.px]="paletteWidth"></app-element-palette>
    <div class="resize-handle" (mousedown)="onResizeStart($event, 'palette')"></div>
    <div class="properties-column" [style.width.px]="propertiesWidth">
      <div class="properties-column__tabs">
        <button
          class="properties-column__tab"
          [class.active]="activePropsTab() === 'properties'"
          (click)="activePropsTab.set('properties')"
        >Properties</button>
        <button
          class="properties-column__tab"
          [class.active]="activePropsTab() === 'ai-chat'"
          (click)="activePropsTab.set('ai-chat')"
        >AI Agent</button>
      </div>
      <div class="properties-column__content">
        @switch (activePropsTab()) {
          @case ('properties') {
            <app-properties-panel></app-properties-panel>
          }
          @case ('ai-chat') {
            <app-ai-chat></app-ai-chat>
          }
        }
      </div>
    </div>
    <div class="resize-handle" (mousedown)="onResizeStart($event, 'properties')"></div>
    <app-canvas class="canvas"></app-canvas>
    <div class="resize-handle" (mousedown)="onResizeStart($event, 'editor')"></div>
    <app-code-editor class="editor" [style.width.px]="editorWidth"></app-code-editor>
  </div>
  <app-page-tabs class="page-tabs"></app-page-tabs>
</div>
